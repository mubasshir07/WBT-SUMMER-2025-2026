<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Form</title>
</head>

<body>

    <form action="#" method="post">

        <div>
            <h2>Donor Information</h2>
        </div>

        <table>

            <tr>
                <td><label for="firstName">First Name:</label></td>
                <td><input type="text" id="firstName" name="firstName" required></td>
            </tr>

            <tr>
                <td><label for="lastName">Last Name:</label></td>
                <td><input type="text" id="lastName" name="lastName" required></td>
            </tr>

            <tr>
                <td><label for="company">Company:</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>

            <tr>
                <td><label for="address1">Address 1:</label></td>
                <td><input type="text" id="address1" name="address1" required></td>
            </tr>

            <tr>
                <td><label for="address2">Address 2:</label></td>
                <td><input type="text" id="address2" name="address2" required></td>
            </tr>

            <tr>
                <td><label for="city">City *</label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>

            <tr>
                <td><label for="state">State *</label></td>
                <td>
                    <select id="state" name="state" required>
                        <option value="">Select a State</option>
                        <option>California</option>
                        <option>Texas</option>
                        <option>Florida</option>
                        <option>New York</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="zip">Zip Code *</label></td>
                <td><input type="text" id="zip" name="zip" required></td>
            </tr>

            <tr>
                <td><label for="country">Country *</label></td>
                <td>
                    <select id="country" name="country" required>
                        <option value="">Select a Country</option>
                        <option>Bangladesh</option>
                        <option>Netherlands</option>
                        <option>Japan</option>
                        <option>UK</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="phone">Phone</label></td>
                <td><input type="tel" id="phone" name="phone"></td>
            </tr>

            <tr>
                <td><label for="fax">Fax</label></td>
                <td><input type="text" id="fax" name="fax"></td>
            </tr>

            <tr>
                <td><label for="email">Email *</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>

            <tr>
                <td>
                    <label>Donation Amount *</label><br>
                    (Check a button or type in your amount)
                </td>
                <td>
                    <label><input type="radio" name="amount" value="none"> None</label>
                    <label><input type="radio" name="amount" value="50"> $50</label>
                    <label><input type="radio" name="amount" value="75"> $75</label>
                    <label><input type="radio" name="amount" value="100"> $100</label>
                    <label><input type="radio" name="amount" value="250"> $250</label>
                    <label><input type="radio" name="amount" value="other"> Other</label>
                </td>
            </tr>

            <tr>
                <td><label for="otherAmount">Other Amount $</label></td>
                <td><input type="number" id="otherAmount" name="otherAmount"></td>
            </tr>

            <tr>
                <td>Recurring Donation</td>
                <td>
                    <label>
                        <input type="checkbox" name="recurring">
                        I am interested in giving on a regular basis.
                    </label>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <label for="monthly">Monthly Credit Card $</label>
                    <input type="number" id="monthly" name="monthly">
                    For
                    <input type="number" id="months" name="months">
                    Months
                </td>
            </tr>

        </table>

        <div>
            <h2>Honorarium and Memorial Donation Information</h2>
        </div>

        <table>

            <tr>
                <td>I would like to make this donation</td>
                <td>
                    <label>
                        <input type="radio" name="tribute" value="honor">
                        To Honor
                    </label>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <label>
                        <input type="radio" name="tribute" value="memory">
                        In Memory Of
                    </label>
                </td>
            </tr>

            <tr>
                <td><label for="name">Name</label></td>
                <td><input type="text" id="name" name="name"></td>
            </tr>

            <tr>
                <td><label for="acknowledge">Acknowledge Donation To</label></td>
                <td><input type="text" id="acknowledge" name="acknowledge"></td>
            </tr>

            <tr>
                <td><label for="address">Address</label></td>
                <td><input type="text" id="address" name="address"></td>
            </tr>

            <tr>
                <td><label for="memCity">City</label></td>
                <td><input type="text" id="memCity" name="memCity"></td>
            </tr>

            <tr>
                <td><label for="memState">State</label></td>
                <td>
                    <select id="memState" name="memState">
                        <option value="">Select a State</option>
                        <option>California</option>
                        <option>Texas</option>
                        <option>Florida</option>
                        <option>New York</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="memZip">Zip</label></td>
                <td><input type="text" id="memZip" name="memZip"></td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <button type="submit">Submit Donation</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>

        </table>

    </form>

</body>

</html>
